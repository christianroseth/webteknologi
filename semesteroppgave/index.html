<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Browser Engine</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #eee;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        min-height: 100vh;
      }
      h1 {
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }
      .controls {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      select, button {
        padding: 0.5rem 1rem;
        border-radius: 4px;
        border: 1px solid #444;
        background: #16213e;
        color: #eee;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover {
        background: #0f3460;
      }
      canvas {
        border: 2px solid #444;
        background: #fff;
      }
      .info {
        margin-top: 1rem;
        font-size: 0.875rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>Mini Browser Engine</h1>
    <div class="controls">
      <select id="testfil">
        <option value="enkel">enkel.html + enkel.css</option>
        <option value="boksmodell">boksmodell.html + boksmodell.css</option>
        <option value="nesting">nesting.html + nesting.css</option>
      </select>
      <button id="render-btn">Render</button>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <p class="info">Velg en testfil og klikk "Render" for å kjøre browser-engine-pipelinen.</p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
